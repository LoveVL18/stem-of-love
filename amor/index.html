<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acesso ao Sistema</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #000;
      font-family: Consolas, monospace;
      overflow: hidden;
      color: #00ff66;
    }
    #terminal {
      height: 100vh;
      overflow-y: auto;
      padding: 30px;
      font-size: 19px;
      line-height: 1.6;
    }
    .cursor {
      display: inline-block;
      width: 10px;
      background: #00ff66;
      margin-left: 3px;
      animation: cursor .8s infinite;
    }
    @keyframes cursor {
      50% { opacity: 0; }
    }
    .progress {
      display: none;
      margin-top: 20px;
      width: 550px;
      height: 24px;
      border: 2px solid #00ff66;
    }
    .bar {
      height: 100%;
      width: 0%;
      background: #00ff66;
    }
    #botao {
      display: none;
      margin-top: 40px;
    }
    button {
      background: #00ff66;
      color: #000;
      font-size: 22px;
      font-weight: bold;
      border: none;
      padding: 18px 35px;
      cursor: pointer;
      transition: .3s;
    }
    button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px #00ff66;
    }
  </style>
</head>
<body>
  <div id="terminal"></div>
  <div style="padding-left:30px;">
    <div class="progress" id="progress">
      <div class="bar" id="bar"></div>
    </div>
    <div id="botao">
      <button onclick="abrirVideo()" aria-label="Abrir vídeo importante">
     
      </button>
    </div>
  </div>

  <script>
    const terminal = document.getElementById("terminal");
    const linhas = [
      "Microsoft Windows [Version 10.0.26100]",
      "(c) Microsoft Corporation. Todos os direitos reservados.",
      "",
      "C:\\Users\\Victor>",
      "",
      "Inicializando sistema...",
      "",
      "Carregando módulos...",
      "",
      "Conectando aos servidores...",
      "",
      "Verificando integridade...",
      "",
      "Status............... OK",
      "",
      "Buscando registros...",
      "",
      "Encontrado 1 arquivo importante.",
      "",
      "Analisando conteúdo...",
      "",
      "████████████████████ 100%",
      "",
      "Arquivo localizado:",
      "",
      "maior_amor_da_minha_vida.dat",
      "",
      "Executando verificação...",
      "",
      "✔ Arquivo autêntico.",
      "",
      "Descrição:",
      "",
      "Este arquivo contém",
      "uma das pessoas",
      "mais importantes",
      "da sua vida.",
      "",
      "Iniciando download...",
      ""
    ];

    let linhaAtual = 0;
    let caractereAtual = 0;
    let textoAtual = "";

    function escreverLinha() {
      if (linhaAtual >= linhas.length) {
        iniciarDownload();
        return;
      }
      let linha = linhas[linhaAtual];
      if (caractereAtual < linha.length) {
        textoAtual += linha.charAt(caractereAtual);
        terminal.innerHTML = textoAtual + '<span class="cursor"></span>';
        caractereAtual++;
        terminal.scrollTop = terminal.scrollHeight;
        setTimeout(escreverLinha, 25);
      } else {
        textoAtual += "<br>";
        linhaAtual++;
        caractereAtual = 0;
        terminal.innerHTML = textoAtual + '<span class="cursor"></span>';
        terminal.scrollTop = terminal.scrollHeight;
        setTimeout(escreverLinha, 300);
      }
    }

    escreverLinha();

    function iniciarDownload() {
      document.getElementById("progress").style.display = "block";
      let barra = document.getElementById("bar");
      let porcentagem = 0;
      let intervalo = setInterval(() => {
        porcentagem++;
        barra.style.width = porcentagem + "%";
        if (porcentagem >= 100) {
          clearInterval(intervalo);
          setTimeout(finalizar, 800);
        }
      }, 35);
    }

    function finalizar() {
      textoAtual += `
        <br>
        Download concluído com sucesso.<br>
        Arquivo salvo com êxito.<br>
        Nome do arquivo:<br>
        https://youtu.be/EbhIAEwSEeI<br>
        Verificando permissões...<br>
        Permissão concedida.<br>
        Pronto para execução.<br>
      `;
      terminal.innerHTML = textoAtual + '<span class="cursor"></span>';
      terminal.scrollTop = terminal.scrollHeight;
      setTimeout(() => {
        document.getElementById("botao").style.display = "block";
      }, 1200);
    }

    function abrirVideo() {
     
      window.location.href = "https://youtu.be/EbhIAEwSEeI";
    }
  </script>
</body>
</html>
